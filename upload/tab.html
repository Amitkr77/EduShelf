<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Infinite Dock</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(180deg,#f6f7fb,#eef1f7);
  height:100vh;
  overflow:hidden;
}

/* CONTENT */
.content{
  height:100vh;
  padding:24px;
  overflow:auto;
}

/* DOCK */
.dock{
  position:fixed;
  bottom:18px;
  left:0;
  right:0;

  height:120px;

  display:flex;
  justify-content:center;
  align-items:flex-end;

  perspective:1000px;
}

.track{
  position:relative;
  width:100%;
  height:100%;
}

/* TAB */
.tab{
  position:absolute;

  width:64px;
  height:64px;

  border-radius:50%;
  border:none;

  background:white;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  box-shadow:0 12px 30px rgba(0,0,0,.08);

  transition:
    transform 450ms cubic-bezier(.22,1,.36,1),
    filter 300ms,
    opacity 300ms;
}

.icon{
  font-size:24px;
}

/* label */
.label{
  position:absolute;
  bottom:78px;
  left:50%;

  transform:translateX(-50%);

  background:#111827;
  color:white;

  font-size:12px;
  padding:6px 10px;

  border-radius:999px;

  opacity:0;

  transition:.25s;

  white-space:nowrap;
}

/* active */
.tab.active{
  background:#111827;
  transform:translateY(-26px) scale(1.25) rotateX(0deg);
  z-index:10;
}

.tab.active .label{
  opacity:1;
}

/* optional glow */
.tab.active::after{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  background:rgba(17,24,39,.15);
  filter:blur(10px);
  z-index:-1;
}
</style>
</head>
<body>

<div class="content">
  <h2>Dashboard</h2>
</div>

<div class="dock">
  <div class="track" id="track"></div>
</div>

<script>
const items = [
  {icon:"🏠", label:"Home"},
  {icon:"📊", label:"Analytics"},
  {icon:"🛒", label:"Orders"},
  {icon:"👥", label:"Users"},
  {icon:"📦", label:"Products"},
  {icon:"⚙️", label:"Settings"},
  {icon:"🔔", label:"Alerts"},
  {icon:"💰", label:"Finance"},
];

const track = document.getElementById("track");

let active = 0;

function mod(n, m){
  return ((n % m) + m) % m;
}

/* CORE RENDER */
function render(){

  track.innerHTML = "";

  const centerX = window.innerWidth / 2;

  const spacing = 85;

  const maxVisible = 4; // left/right range

  for(let i = -maxVisible; i <= maxVisible; i++){

    const idx = mod(active + i, items.length);
    const item = items[idx];

    const btn = document.createElement("button");
    btn.className = "tab" + (i === 0 ? " active" : "");

    /* --- POSITION --- */
    const x = centerX + i * spacing - 32;

    /* --- 3D ARC EFFECT --- */
    const rotate = i * 12;       // curve
    const scale = i === 0 ? 1.25 : 0.75 + (1 - Math.abs(i) * 0.12);
    const translateY = i === 0 ? -28 : Math.abs(i) * 6;

    /* depth fade */
    const opacity = 1 - Math.abs(i) * 0.15;

    btn.style.left = x + "px";
    btn.style.opacity = opacity;

    btn.style.transform =
      `translateY(${translateY}px)
       scale(${scale})
       rotateX(${Math.abs(i)*10}deg)`;

    btn.innerHTML = `
      <span class="label">${item.label}</span>
      <span class="icon">${item.icon}</span>
    `;

    btn.onclick = () => {
      active = idx;
      render();
    };

    track.appendChild(btn);
  }
}

/* optional: swipe support */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if(endX < startX - 40){
    active = mod(active + 1, items.length);
    render();
  }

  if(endX > startX + 40){
    active = mod(active - 1, items.length);
    render();
  }
});

window.addEventListener("resize", render);
render();
</script>

</body>
</html>
